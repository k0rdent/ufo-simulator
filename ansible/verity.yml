---
- name: Install Verity operator
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  ignore_errors: false
  vars:
    workspace: /opt/ufo_lab/
    verity_operator_branch: main

  tasks:
    - name: Install Verity operator via helm chart
      when: not verity_operator_mode
      block:
        - name: Ensure target directory
          file:
            path: "{{ k8s_artifacts_dir }}/ufo/"
            state: directory

        - name: Create Kubernetes secret
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: verity-credentials
                namespace: "ufo"
              type: "Opaque"
              data:
                VERITY_API_LOGIN: "{{ verity_api_username | b64encode }}"
                VERITY_API_PASSWORD: "{{ verity_api_password | b64encode }}"
    
        - name: Handle verity templates
          block:
            - name: Render templates
              ansible.builtin.template:
                src: "k8s/ufo/{{ item }}"
                dest: "{{ k8s_artifacts_dir }}/ufo/{{ item }}"
              with_items:
               - "verity_operator.yaml"
    
        - name: Deploy/upgrade verity operator helm release
          kubernetes.core.helm:
            name: ufo
            kubeconfig: "{{ kubeconfig_path }}"
            chart_ref: "{{ verity_operator_chart_repo }}"
            chart_version: "{{ verity_operator_chart_version }}"
            release_namespace: ufo
            create_namespace: true
            values_files:
              - "{{ k8s_artifacts_dir }}/ufo/verity_operator.yaml"
            state: present
            wait: true
            wait_timeout: 300s
