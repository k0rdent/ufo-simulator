# Virtual Switch Lab Configuration
# Adjust these values based on your available RAM
#
artifacts_dir: "{{ playbook_dir }}/artifacts"
k8s_artifacts_dir: "{{ artifacts_dir }}/k8s"

# Base images
cumulus_image: "/var/lib/libvirt/images/cumulus-linux-5.11.1-vx-amd64-qemu.qcow2"
cumulus_image_url: "https://networkingdownloads.nvidia.com/custhelp/Non_Monetized_Products/Software/CumulusSoftware/CumulusVX/cumulus-linux-5.11.1-vx-amd64-qemu.qcow2"
ubuntu_image: "/var/lib/libvirt/images/ubuntu-24.04-server-cloudimg-amd64.img"
vm_disk_path: "/var/lib/libvirt/images"

sonic_image_url: "https://artifactory.mcp.mirantis.net:443/artifactory/binary-dev-k0rdent-ai-local/ufo/verity/sonic-vs.img"
sonic_image: "/var/lib/libvirt/images/sonic-vs.img"

# VM Resources
switch_vcpus: 4
switch_memory_mb: 6192
server_vcpus: 2
server_memory_mb: 4096

# Management network - SSH access to VMs via port forwarding
mgmt_ssh_base_port: 2200  # leaf-0 = 2200, leaf-1 = 2201, etc.

# UDP tunnel base port for inter-switch links
udp_base_port: 10000

switch_port_name_prefix: "swp" # For verity eth1/

# Topology Definition
# Simple leaf-spine topology for testing
topology:
  north_south:
    fabric_type: bridge
    bridge_name: br-pxe
  spines:
    - name: spine-0
      mgmt_ip: 10.200.0.110
    - name: spine-1
      mgmt_ip: 10.200.0.111
  leafs:
    - name: leaf-0
      mgmt_ip: 10.200.0.100
      pod_id: 1
      su_id: 2
      rail_id: 0
      type: spectrum-x
    - name: leaf-1
      mgmt_ip: 10.200.0.101
      pod_id: 1
      su_id: 2
      rail_id: 1
      type: spectrum-x
    - name: ext-leaf-0
      mgmt_ip: 10.200.0.102
    - name: ext-leaf-1
      mgmt_ip: 10.200.0.103
  nodes:
    - name: vm-0
      host_id: 0
    - name: vm-1
      host_id: 1
    - name: vm-2
      host_id: 2
    - name: vm-3
      host_id: 3
    - name: vm-4
      host_id: 4
    - name: vm-5
      host_id: 5
  softgates:
    - name: sg-0
      role: general
    - name: sg-1
      role: snat

  # Links format: [local_switch, local_port, remote_switch, remote_port]
  # Each link will get a unique UDP port pair
  links:
    - { local: "leaf-0", local_port: "{{ switch_port_name_prefix }}1", remote: "vm-0", remote_port: "eth1", role: "rail1", rail_id: 0 }
    - { local: "leaf-0", local_port: "{{ switch_port_name_prefix }}2", remote: "vm-1", remote_port: "eth1", role: "rail1", rail_id: 0  }
    - { local: "leaf-0", local_port: "{{ switch_port_name_prefix }}3", remote: "vm-2", remote_port: "eth1", role: "rail1", rail_id: 0  }
