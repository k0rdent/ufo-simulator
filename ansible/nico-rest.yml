---
# Install NICO REST stack on gateway nodes.
#   ansible-playbook -i inventory.yml nico-rest.yml

- name: Install NICO REST packages and tooling
  hosts: gtws
  gather_facts: true
  become: true

  vars_files:
    - ./vars/common.yml
    - ./vars/{{ sdn_provider }}.yml

  vars:
    containerd_config_path: /etc/containerd/config.toml
    containerd_apt_packages:
      - containerd
    nico_rest_apt_packages:
      - make
      - jq
      - git
      - wget
    docker_apt_packages:
      - docker.io
      - docker-buildx
    docker_daemon_config_path: /etc/docker/daemon.json
    docker_daemon_config:
      default-address-pools:
        - base: 10.20.0.0/16
          size: 24
    kind_version: "0.27.0"
    go_version: 1.25.5

  handlers:
    - name: Restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted

    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted

  tasks:
    - name: Install packages and tooling
      ansible.builtin.include_tasks: tasks/nico_rest/install_packages.yml

- name: Fetch NICO REST sources
  hosts: gtws
  gather_facts: false
  become: true

  vars_files:
    - ./vars/common.yml
    - ./vars/{{ sdn_provider }}.yml

  tasks:
    - name: Clone repositories
      ansible.builtin.include_tasks: tasks/nico_rest/clone_repos.yml

- name: Deploy NICO REST infrastructure
  hosts: gtws
  gather_facts: false
  become: true

  vars_files:
    - ./vars/common.yml
    - ./vars/{{ sdn_provider }}.yml

  tasks:
    - name: Reset kind cluster
      ansible.builtin.include_tasks: tasks/nico_rest/kind_reset.yml

- name: Build and load nico-core-mock image
  hosts: gtws
  gather_facts: false
  become: true

  vars_files:
    - ./vars/common.yml
    - ./vars/{{ sdn_provider }}.yml

  tasks:
    - name: Build nico-core-mock image
      ansible.builtin.include_tasks: tasks/nico_rest/build_mock_image.yml

    - name: Load nico-core-mock image into kind
      ansible.builtin.include_tasks: tasks/nico_rest/load_mock_image.yml

- name: Deploy nico-core-mock
  hosts: gtws
  gather_facts: false
  become: true

  vars_files:
    - ./vars/common.yml
    - ./vars/{{ sdn_provider }}.yml

  tasks:
    - name: Deploy mock core Helm release
      ansible.builtin.include_tasks: tasks/nico_rest/deploy_mock_core.yml
