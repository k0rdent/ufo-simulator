---
# Install build/dev tools on gateway nodes.
#   ansible-playbook -i inventory.yml nico-rest.yml

- name: Install nico-rest packages on gateway nodes
  hosts: gtws
  gather_facts: true
  become: true

  vars_files:
    - ./vars/common.yml
    - ./vars/{{ sdn_provider }}.yml

  vars:
    workspace: /opt/ufo_lab/
    infra_controller_repo: https://github.com/ya-isakov/infra-controller
    infra_controller_dir: "{{ workspace }}/infra-controller"
    infra_controller_rest_api_dir: "{{ infra_controller_dir }}/rest-api"
    containerd_config_path: /etc/containerd/config.toml
    containerd_apt_packages:
      - containerd
    nico_rest_apt_packages:
      - make
      - jq
      - git
    docker_apt_packages:
      - docker.io
      - docker-buildx
    docker_daemon_config_path: /etc/docker/daemon.json
    docker_daemon_config:
      default-address-pools:
        - base: 10.20.0.0/16
          size: 24
    kind_version: "0.27.0"

  handlers:
    - name: Restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted

    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted

  tasks:
    - name: Install apt packages
      ansible.builtin.apt:
        name: "{{ nico_rest_apt_packages }}"
        state: present
        update_cache: true

    - name: Install containerd
      ansible.builtin.apt:
        name: "{{ containerd_apt_packages }}"
        state: present

    - name: Ensure containerd config directory
      ansible.builtin.file:
        path: "{{ containerd_config_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Configure containerd
      ansible.builtin.template:
        src: nico-rest/containerd.toml.j2
        dest: "{{ containerd_config_path }}"
        mode: "0644"
      notify: Restart containerd

    - name: Ensure Docker config directory
      ansible.builtin.file:
        path: "{{ docker_daemon_config_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Configure Docker daemon address pools
      ansible.builtin.copy:
        dest: "{{ docker_daemon_config_path }}"
        content: "{{ docker_daemon_config | to_nice_json }}\n"
        mode: "0644"
      notify: Restart Docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_apt_packages }}"
        state: present

    - name: Apply containerd and Docker configuration
      ansible.builtin.meta: flush_handlers

    - name: Install kind
      ansible.builtin.get_url:
        url: "https://kind.sigs.k8s.io/dl/v{{ kind_version }}/kind-linux-amd64"
        dest: /usr/local/bin/kind
        mode: "0755"

    - name: Install kubectl latest stable
      ansible.builtin.shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
        rm -f kubectl
      args:
        creates: /usr/local/bin/kubectl
      changed_when: false

    - name: Install Helm via official one-liner script
      ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        executable: /bin/bash
        creates: /usr/local/bin/helm
      changed_when: false

    - name: Ensure workspace directory
      ansible.builtin.file:
        path: "{{ workspace }}"
        state: directory

    - name: Clone infra-controller repository
      ansible.builtin.git:
        repo: "{{ infra_controller_repo }}"
        dest: "{{ infra_controller_dir }}"
        update: true

    - name: Reset kind cluster for rest-api
      ansible.builtin.command:
        cmd: make kind-reset
        chdir: "{{ infra_controller_rest_api_dir }}"
