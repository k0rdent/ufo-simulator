---
apiVersion: nico.mirantis.com/v1alpha1
kind: SSHKey
metadata:
  name: admin-key
  namespace: platform-admin
spec:
  publicKey: "ssh-rsa "
---
apiVersion: nico.mirantis.com/v1alpha1
kind: SSHKeyGroup
metadata:
  name: dev-team-keys
  namespace: platform-admin
spec:
  description: SSH keys for the dev team
  sshKeys:
    - "admin-key"
