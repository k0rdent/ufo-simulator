---
apiVersion: ufo.mirantis.com/v1alpha1
kind: SubnetPool
metadata:
  name: global-default
  namespace: platform-admin
spec:
  ip_version: 4
  min_prefix: 19
  max_prefix: 32
  prefixes:
    - 20.20.0.0/16
  tags:
    - default
---
apiVersion: ufo.mirantis.com/v1alpha1
kind: SubnetPool
metadata:
  name: global-public
  namespace: platform-admin
spec:
  ip_version: 4
  min_prefix: 19
  max_prefix: 32
  prefixes:
    - 192.168.100.0/16
  tags:
    - public
