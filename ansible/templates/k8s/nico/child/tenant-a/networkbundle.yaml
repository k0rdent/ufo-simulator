# NetworkBundle for NICO backend.
apiVersion: ufo.mirantis.com/v1alpha1
kind: NetworkBundle
metadata:
  name: tenant-a-networkbundle
  namespace: tenant-a
spec:
  clusterName: tenant-a-cluster
  networkv2:
    ethernets:
      eth-pf0:
        connectToNetwork:
          name: ns-network
      eth-vf0:
        link: eth-pf0
        addresses:
          - ipFromSubnet:
              name: ns-subnet
    infinibands:
      ibpf0:
        connectToNetwork:
          name: ib-network
      ibpf1:
        connectToNetwork:
          name: ib-network
      ibpf2:
        connectToNetwork:
          name: ib-network
      ibpf3:
        connectToNetwork:
          name: ib-network
            #    nvlinks:
            #      nvlink1:
            #        connectToNetwork:
            #          name: nvlink-partition
