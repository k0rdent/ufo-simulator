---
- name: Render NICO Kubernetes artifacts
  hosts: cmps
  connection: local
  become: true
  gather_facts: false

  vars_files:
    - ./vars/common.yml
    - ./vars/{{ sdn_provider }}.yml

  tasks:
    - name: Ensure artifacts directory exists
      ansible.builtin.file:
        path: "{{ k8s_artifacts_dir }}"
        state: directory
        recurse: true

    - name: Render NICO CAPI child cluster artifacts
      when: nico_capi_provider_enabled | bool
      block:
        - name: Ensure NICO provider and platform admin artifact directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
          loop:
            - "{{ k8s_artifacts_dir }}/nico/child/platform_admin"

        - name: Render NICO platform admin manifests
          ansible.builtin.template:
            src: "k8s/nico/child/platform_admin/{{ item }}"
            dest: "{{ k8s_artifacts_dir }}/nico/child/platform_admin/{{ item }}"
          loop:
            - subnetpool.yaml
            - ssh-key.yaml
            - security-group.yaml
            - operating-system.yaml
            - instance-type.yaml

        - name: Render per-tenant NICO child cluster artifacts
          ansible.builtin.include_tasks: tasks/nico_render_child_tenant.yml
          loop: "{{ nico_child_tenants }}"
          loop_control:
            loop_var: nico_child_tenant
