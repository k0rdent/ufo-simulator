---
- name: Render NICO Kubernetes artifacts
  hosts: cmps
  connection: local
  become: true
  gather_facts: false

  vars_files:
    - ./vars/common.yml
    - ./vars/{{ sdn_provider }}.yml

  tasks:
    - name: Ensure artifacts directory exists
      ansible.builtin.file:
        path: "{{ k8s_artifacts_dir }}"
        state: directory
        recurse: true

    - name: Render NICO CAPI child cluster artifacts
      when: nico_capi_provider_enabled | bool
      block:
        - name: Ensure NICO artifact directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
          loop:
            - "{{ k8s_artifacts_dir }}/nico/child/provider_admin"
            - "{{ k8s_artifacts_dir }}/nico/child/platform_admin"
            - "{{ k8s_artifacts_dir }}/nico/child/{{ nico_child_tenant }}"

        - name: Render NICO provider admin manifests
          ansible.builtin.template:
            src: "k8s/nico/child/provider_admin/{{ item }}"
            dest: "{{ k8s_artifacts_dir }}/nico/child/provider_admin/{{ item }}"
          loop:
            - subnetpool.yaml
            - "{{ nico_child_tenant }}-vpc.yaml"
            - "{{ nico_child_tenant }}-subnetpoolallocation.yaml"

        - name: Render NICO platform admin manifests
          ansible.builtin.template:
            src: "k8s/nico/child/platform_admin/{{ item }}"
            dest: "{{ k8s_artifacts_dir }}/nico/child/platform_admin/{{ item }}"
          loop:
            - ssh-key.yaml
            - security-group.yaml

        - name: Apply NICO platform admin manifests
          kubernetes.core.k8s:
            kubeconfig: "{{ kubeconfig_path }}"
            state: present
            src: "{{ k8s_artifacts_dir }}/nico/child/platform_admin/{{ item }}"
          loop:
            - ssh-key.yaml
            - security-group.yaml

        - name: Wait for platform-admin SSHKeyGroup to be reconciled into NICO
          kubernetes.core.k8s_info:
            kubeconfig: "{{ kubeconfig_path }}"
            api_version: nico.mirantis.com/v1alpha1
            kind: SSHKeyGroup
            namespace: platform-admin
            name: "{{ nico_prepovision_platform_admin_ssh_key_group_name }}"
          register: nico_platform_admin_ssh_key_group_cr
          until: (nico_platform_admin_ssh_key_group_cr.resources[0].status.id | default('')) | length > 0
          retries: 30
          delay: 5

        - name: Wait for platform-admin NetworkSecurityGroup to be reconciled into NICO
          kubernetes.core.k8s_info:
            kubeconfig: "{{ kubeconfig_path }}"
            api_version: nico.mirantis.com/v1alpha1
            kind: NetworkSecurityGroup
            namespace: platform-admin
            name: "{{ nico_prepovision_network_security_group_name }}"
          register: nico_platform_admin_nsg_cr
          until: (nico_platform_admin_nsg_cr.resources[0].status.id | default('')) | length > 0
          retries: 30
          delay: 5

        - name: Render NICO tenant prepovision manifests
          ansible.builtin.template:
            src: "k8s/nico/child/{{ nico_child_tenant }}/{{ item }}"
            dest: "{{ k8s_artifacts_dir }}/nico/child/{{ nico_child_tenant }}/{{ item }}"
          loop:
            - instance-type.yaml
            - operating-system.yaml
            - ssh-key.yaml
            - networks.yaml
            - networkbundle.yaml

        - name: Fetch NICO resource IDs from REST API
          ansible.builtin.include_tasks: tasks/nico_fetch_resources_id.yml

        - name: Render NICO child cluster template
          ansible.builtin.template:
            src: "k8s/nico/child/{{ nico_child_tenant }}/cluster.yaml.j2"
            dest: "{{ k8s_artifacts_dir }}/nico/child/{{ nico_child_tenant }}/cluster.yaml"
