heat_template_version: queens
parameters:
  key_name:
    type: string
    description: Name of keypair to assign to servers
  image:
    type: string
    description: Name of image to use for servers
  flavor:
    type: string
    description: Flavor to use for servers
  wan_network:
    type: string
  wan_subnet_id:
    type: string
  wan_mac_address:
    type: string
    default: 'fa:16:3e:73:10:00'
  wan_ip_address:
    type: string
  mgmt_network:
    type: string
  mgmt_subnet_id:
    type: string
  mgmt_mac_address:
    type: string
    default: 'fa:16:3e:73:11:00'
  mgmt_ip_address:
    type: string
  dummy_network:
    type: string
  dummy_subnet_id:
    type: string
  dummy_mac_address:
    type: string
    default: 'fa:16:3e:73:12:00'

resources:
  server:
    type: OS::Nova::Server
    properties:
      config_drive: true
      image: { get_param: image }
      flavor: { get_param: flavor }
      networks:
        - port: { get_resource: wan_server_port }
        - port: { get_resource: dummy_server_port }
        - port: { get_resource: mgmt_server_port }
  wan_server_port:
    type: OS::Neutron::Port
    properties:
      network_id: { get_param: wan_network }
      port_security_enabled: false
      mac_address: { get_param: wan_mac_address }
      fixed_ips:
        - subnet: { get_param: wan_subnet_id }
          ip_address: { get_param: wan_ip_address }
  dummy_server_port:
    type: OS::Neutron::Port
    properties:
      network_id: { get_param: dummy_network }
      port_security_enabled: false
      mac_address: { get_param: dummy_mac_address }
      fixed_ips:
        - subnet: { get_param: dummy_subnet_id }
  mgmt_server_port:
    type: OS::Neutron::Port
    properties:
      network_id: { get_param: mgmt_network }
      port_security_enabled: false
      mac_address: { get_param: mgmt_mac_address }
      fixed_ips:
        - subnet: { get_param: mgmt_subnet_id }
          ip_address: { get_param: mgmt_ip_address }
outputs:
  wan_ip:
    description: IP address of wan port
    value: { get_attr: [ wan_server_port, fixed_ips ] }
  mgmt_ip:
    description: IP address of mgmt port
    value: { get_attr: [ mgmt_server_port, fixed_ips ] }
